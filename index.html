<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#06110f">
  <title>ずんだもん何切る</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f6f2df;
      --muted: #9aa9a4;
      --felt-0: #06110f;
      --felt-1: #0b2f28;
      --felt-2: #0f493c;
      --gold: #d8a83c;
      --gold-light: #f2d27b;
      --orange: #b65a22;
      --orange-light: #e7863b;
      --line: rgba(242, 210, 123, .24);
      --shadow: 0 16px 44px rgba(0, 0, 0, .36);
      font-family: "Yu Mincho", "YuMincho", "Hiragino Mincho ProN", "HGS明朝E", "MS PMincho", serif;
      font-weight: 900;
    }

    * { box-sizing: border-box; }
    [hidden] { display: none !important; }

    html, body { min-height: 100%; }

    body {
      margin: 0;
      min-width: 320px;
      min-height: 100dvh;
      overflow: hidden;
      color: var(--ink);
      background:
        linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.014) 1px, transparent 1px),
        radial-gradient(circle at 50% -12%, #17604e 0, var(--felt-1) 38%, var(--felt-0) 82%);
      background-size: 24px 24px, 24px 24px, auto;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
      touch-action: manipulation;
    }

    body.reviewing {
      overflow-y: auto;
      overscroll-behavior-y: contain;
    }

    button, a { font: inherit; }
    button { color: inherit; }

    .app {
      width: min(100%, 28rem);
      min-height: 100dvh;
      margin: 0 auto;
      padding: max(10px, env(safe-area-inset-top)) 12px max(12px, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      gap: 9px;
      position: relative;
    }

    .app::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at center, transparent 45%, rgba(0, 0, 0, .24));
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 8px;
      min-height: 48px;
      position: relative;
      z-index: 1;
    }

    .brand-kicker {
      margin: 0 0 -2px;
      color: var(--gold-light);
      font-size: 10px;
      letter-spacing: .24em;
      text-shadow: 0 2px 4px #000;
    }

    h1 {
      margin: 0;
      font-size: clamp(25px, 8vw, 34px);
      line-height: 1;
      letter-spacing: -.03em;
      text-shadow: 0 3px 0 #03110e, 0 6px 12px rgba(0,0,0,.6);
      -webkit-text-stroke: .35px rgba(242, 210, 123, .55);
    }

    .counter {
      padding-bottom: 2px;
      color: var(--gold-light);
      font-size: 14px;
      white-space: nowrap;
      text-shadow: 0 2px 3px #000;
    }

    .top-actions { display: flex; align-items: center; gap: 7px; padding-bottom: 1px; }
    .admin-link {
      padding: 4px 6px;
      border: 1px solid rgba(242,210,123,.2);
      border-radius: 5px;
      color: var(--muted);
      background: rgba(0,0,0,.18);
      font-size: 9px;
      text-decoration: none;
    }

    .progress {
      height: 4px;
      overflow: hidden;
      border-radius: 2px;
      background: rgba(0, 0, 0, .38);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.05);
    }

    .progress > span {
      display: block;
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, var(--orange), var(--gold-light));
      transition: width .28s ease;
    }

    .board {
      position: relative;
      z-index: 1;
      display: flex;
      flex: 1;
      flex-direction: column;
      gap: 9px;
      min-height: 0;
    }

    .situation {
      padding: 10px 11px 9px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: linear-gradient(145deg, rgba(15,73,60,.76), rgba(3,22,18,.78));
      box-shadow: var(--shadow), inset 0 1px rgba(255,255,255,.04);
    }

    .situation-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .round-line {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 2px 10px;
      min-width: 0;
    }

    .round {
      color: var(--gold-light);
      font-size: 22px;
      line-height: 1;
      text-shadow: 0 2px 3px #000;
    }

    .seat, .turn { font-size: 15px; }

    .sub-line {
      min-height: 16px;
      margin-top: 6px;
      display: flex;
      gap: 12px;
      color: var(--muted);
      font-size: 11px;
    }

    .dora-box {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: none;
    }

    .dora-label {
      padding: 3px 5px;
      color: #1b1608;
      border-radius: 3px;
      background: linear-gradient(#f2d27b, #b77c20);
      font-size: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,.35);
    }

    .dora-tile {
      width: 30px;
      height: auto;
      display: block;
      border-radius: 2px;
      filter: drop-shadow(0 3px 3px rgba(0,0,0,.45));
    }

    .hand-stage {
      flex: 0 0 auto;
      container-type: inline-size;
      padding: 15px 5px 10px;
      border-top: 1px solid rgba(242,210,123,.16);
      border-bottom: 1px solid rgba(242,210,123,.16);
      background: linear-gradient(90deg, transparent, rgba(15,73,60,.42) 8%, rgba(15,73,60,.42) 92%, transparent);
    }

    .tiles-line {
      --visual-count: 14;
      --tile-width: min(40px, calc((min(100vw, 28rem) - 58px) / var(--visual-count)));
      --tile-width: min(40px, calc((100cqw - 24px) / var(--visual-count)));
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 1px;
      min-width: 0;
    }

    .hand-tiles, .meld-tiles {
      display: flex;
      align-items: flex-end;
      gap: 1px;
      min-width: 0;
    }

    .meld-tiles {
      margin-left: 5px;
      padding-left: 5px;
      border-left: 1px solid rgba(242,210,123,.4);
    }

    .meld-group { display: flex; align-items: flex-end; flex: none; gap: 0; }

    .tile-button {
      padding: 0;
      border: 0;
      border-radius: 3px;
      background: transparent;
      cursor: pointer;
      position: relative;
      transition: transform .1s ease, filter .1s ease;
      touch-action: manipulation;
    }

    .tile-button img, .meld-tile {
      height: auto;
      display: block;
      border-radius: 3px;
      filter: drop-shadow(0 3px 2px rgba(0,0,0,.42));
      pointer-events: none;
    }

    .tile-button img { width: 100%; }

    .tile-button, .meld-tile {
      width: var(--tile-width);
      min-width: var(--tile-width);
      flex: 0 0 var(--tile-width);
    }

    .tile-button:hover { filter: brightness(1.05); }

    .tile-button.selected {
      z-index: 2;
      transform: translateY(-9px);
      filter: drop-shadow(0 0 5px var(--gold-light));
    }

    .tile-button.selected::after {
      content: "";
      position: absolute;
      inset: -3px;
      border: 2px solid var(--gold-light);
      border-radius: 5px;
      box-shadow: 0 0 0 1px #5a3808, 0 0 10px rgba(242,210,123,.7);
    }

    .tile-button:focus-visible {
      outline: 3px solid var(--gold-light);
      outline-offset: 2px;
    }

    .meld-tile {
      opacity: .91;
    }

    .meld-tile.sideways {
      margin-inline: calc(var(--tile-width) * .181818);
      transform: translateY(calc(var(--tile-width) * .181818)) rotate(90deg);
      filter: drop-shadow(3px 0 2px rgba(0,0,0,.42));
    }

    .hand-caption {
      min-height: 20px;
      margin-top: 8px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }

    .hand-caption strong {
      color: var(--gold-light);
      font-size: 15px;
    }

    .decision {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(144px, 1.25fr);
      gap: 8px;
      align-items: stretch;
    }

    .selected-panel {
      min-height: 52px;
      padding: 7px 9px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 8px;
      background: rgba(0,0,0,.2);
    }

    .selected-panel small { color: var(--muted); font-size: 10px; }
    .selected-name { margin-top: 2px; color: var(--gold-light); font-size: 17px; }

    .primary {
      min-height: 52px;
      padding: 8px 12px;
      border: 1px solid #efad5e;
      border-radius: 8px;
      color: #fff8e6;
      background: linear-gradient(180deg, var(--orange-light), #9c4017);
      box-shadow: 0 4px 0 #58200b, 0 7px 15px rgba(0,0,0,.3), inset 0 1px rgba(255,255,255,.25);
      font-size: 16px;
      text-shadow: 0 2px 2px rgba(0,0,0,.55);
      cursor: pointer;
    }

    .primary:active:not(:disabled) { transform: translateY(3px); box-shadow: 0 1px 0 #58200b; }
    .primary:disabled { opacity: .35; cursor: default; filter: grayscale(.5); }

    .review {
      display: none;
      padding: 13px;
      border: 1px solid rgba(242,210,123,.32);
      border-radius: 10px;
      background: linear-gradient(145deg, rgba(12,47,40,.98), rgba(4,20,17,.98));
      box-shadow: var(--shadow);
    }

    .review.open { display: block; animation: reveal .2s ease-out; }

    @keyframes reveal {
      from { opacity: 0; transform: translateY(7px); }
      to { opacity: 1; transform: none; }
    }

    .review h2 {
      margin: 0 0 9px;
      color: var(--gold-light);
      font-size: 18px;
      text-shadow: 0 2px 3px #000;
    }

    .answer-feedback {
      margin-bottom: 11px;
      padding: 9px 11px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      border-radius: 8px;
      background: rgba(0,0,0,.22);
    }
    .answer-feedback strong { font-size: 21px; }
    .answer-feedback span { color: var(--muted); font-size: 12px; text-align: right; }
    .answer-feedback.correct { border: 1px solid rgba(218,55,43,.72); }
    .answer-feedback.correct strong { color: #ff6659; }
    .answer-feedback.incorrect { border: 1px solid rgba(57,128,219,.72); }
    .answer-feedback.incorrect strong { color: #6ba9f4; }

    .explanation {
      color: #e9eadf;
      font-family: "Yu Gothic", "YuGothic", "Hiragino Kaku Gothic ProN", sans-serif;
      font-size: 14px;
      font-weight: 600;
      line-height: 1.75;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .explanation a { color: var(--gold-light); }

    .review-actions {
      margin-top: 12px;
      display: grid;
      grid-template-columns: 1fr 1.35fr;
      gap: 8px;
    }

    .secondary, .next-button, .nav-button {
      min-height: 44px;
      border: 1px solid rgba(242,210,123,.34);
      border-radius: 7px;
      background: rgba(2,17,14,.72);
      cursor: pointer;
    }

    .next-button {
      border-color: #d99b49;
      background: linear-gradient(#bd682c, #814015);
      box-shadow: 0 3px 0 #4c260c;
    }

    .source-link {
      margin-top: 11px;
      display: inline-block;
      color: var(--muted);
      font-family: "Yu Gothic", "YuGothic", sans-serif;
      font-size: 11px;
      font-weight: 600;
    }

    .bottom-nav {
      margin-top: auto;
      padding-top: 2px;
      display: grid;
      grid-template-columns: 80px 1fr 80px;
      align-items: center;
      gap: 8px;
    }

    .nav-button { min-height: 39px; font-size: 12px; }
    .nav-button:disabled { opacity: .28; }

    .answered-count {
      color: var(--muted);
      text-align: center;
      font-size: 10px;
    }

    .answered-count strong { color: var(--gold-light); font-size: 14px; }

    .loading, .fatal {
      margin: auto;
      padding: 24px;
      text-align: center;
      line-height: 1.8;
    }

    .fatal { color: #ffd4c8; }

    body.menu-open {
      overflow-y: auto;
      overscroll-behavior-y: contain;
      touch-action: pan-y;
    }

    body.play-open { overflow: hidden; }

    .menu-app {
      display: block;
      padding-bottom: max(28px, env(safe-area-inset-bottom));
    }

    .menu-header {
      min-height: 108px;
      padding: 12px 66px 8px 2px;
      position: relative;
      z-index: 1;
    }

    .menu-header h1 { font-size: clamp(29px, 9vw, 36px); }

    .menu-admin-entry {
      min-height: 30px;
      margin-top: 9px;
      padding: 5px 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(242,210,123,.38);
      border-radius: 8px;
      color: var(--gold-light);
      background: rgba(2,17,14,.72);
      font-size: 11px;
      text-decoration: none;
      box-shadow: 0 2px 0 rgba(0,0,0,.3);
    }

    .settings-tab-button {
      width: 56px;
      height: 56px;
      padding: 4px;
      position: absolute;
      top: 10px;
      right: 0;
      border: 1px solid rgba(242,210,123,.28);
      border-radius: 14px;
      color: var(--muted);
      background: rgba(0,0,0,.25);
      cursor: pointer;
    }

    .settings-tab-button.active {
      color: #251607;
      border-color: var(--gold-light);
      background: linear-gradient(#f2d27b, #b77c20);
    }

    .settings-tab-button span { display: block; font-size: 19px; line-height: 1; }
    .settings-tab-button small { display: block; margin-top: 5px; font-size: 10px; }

    .menu-tabs {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 3px;
      margin: 3px 0 12px;
      padding: 4px;
      border-radius: 18px;
      background: rgba(0,0,0,.22);
      position: relative;
      z-index: 1;
    }

    .menu-tab {
      min-width: 0;
      min-height: 48px;
      padding: 5px 1px;
      border: 1px solid transparent;
      border-radius: 14px;
      color: var(--muted);
      background: rgba(2,17,14,.7);
      font-size: 9px;
      line-height: 1.12;
      cursor: pointer;
    }

    .menu-tab span { display: block; margin-bottom: 3px; font-size: 16px; line-height: 1; }
    .menu-tab.active {
      color: #251607;
      border-color: var(--gold-light);
      background: linear-gradient(#f2d27b, #b77c20);
      box-shadow: 0 3px 0 #69410b;
    }

    .menu-panel {
      padding: 14px;
      border: 1px solid rgba(242,210,123,.28);
      border-radius: 14px;
      background: linear-gradient(145deg, rgba(12,47,40,.94), rgba(4,20,17,.94));
      box-shadow: var(--shadow);
      position: relative;
      z-index: 1;
    }

    .menu-panel h2 { margin: 0; color: var(--gold-light); font-size: 21px; }
    .menu-panel h3 { margin: 0; font-size: 16px; }
    .menu-lead { margin: 6px 0 14px; color: var(--muted); font-size: 12px; line-height: 1.6; }

    .mode-grid { display: grid; gap: 10px; }

    .mode-card {
      width: 100%;
      min-height: 86px;
      padding: 13px 16px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      border: 1px solid #e5a555;
      border-radius: 12px;
      color: #fff7e8;
      background: linear-gradient(150deg, #b96328, #6f3214);
      box-shadow: 0 4px 0 #3f1c0b, 0 8px 18px rgba(0,0,0,.28), inset 0 1px rgba(255,255,255,.18);
      text-align: left;
      cursor: pointer;
    }

    .mode-card.all { background: linear-gradient(150deg, #9c531f, #4f2911); }
    .mode-card strong { display: block; font-size: 24px; }
    .mode-card small { display: block; margin-top: 4px; color: #f4d9b4; font-size: 11px; }
    .mode-card b { color: var(--gold-light); font-size: 24px; }

    .resume-card,
    .menu-note {
      margin-top: 12px;
      padding: 12px;
      border: 1px solid rgba(242,210,123,.18);
      border-radius: 10px;
      background: rgba(0,0,0,.2);
    }

    .menu-actions { display: flex; gap: 8px; margin-top: 10px; }

    .menu-primary,
    .menu-secondary,
    .menu-danger {
      min-height: 42px;
      padding: 9px 13px;
      border-radius: 8px;
      cursor: pointer;
    }

    .menu-primary {
      border: 1px solid #e5a555;
      color: #fff8e6;
      background: linear-gradient(#c86f2f, #853b16);
    }

    .menu-secondary {
      border: 1px solid rgba(242,210,123,.3);
      color: var(--ink);
      background: rgba(2,17,14,.72);
    }

    .menu-danger {
      border: 1px solid rgba(220,91,74,.55);
      color: #ffd8d0;
      background: rgba(81,24,18,.5);
    }

    .menu-primary:disabled,
    .menu-secondary:disabled { opacity: .35; cursor: default; }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    .summary-card {
      padding: 12px 8px;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 10px;
      background: rgba(0,0,0,.2);
      text-align: center;
    }

    .summary-card strong { display: block; color: var(--gold-light); font-size: 23px; }
    .summary-card small { color: var(--muted); font-size: 10px; }

    .question-list,
    .ranking-list { display: grid; gap: 7px; margin-top: 12px; }

    .question-row,
    .ranking-row {
      width: 100%;
      padding: 10px 11px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 9px;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 9px;
      color: var(--ink);
      background: rgba(0,0,0,.2);
      text-align: left;
    }

    button.question-row { cursor: pointer; }
    .question-row strong { color: var(--gold-light); font-size: 13px; }
    .question-row span { min-width: 0; font-size: 11px; }
    .question-row em { color: var(--muted); font-size: 10px; font-style: normal; white-space: nowrap; }
    .ranking-row { grid-template-columns: 36px 1fr auto; }
    .ranking-place { color: var(--gold-light); text-align: center; font-size: 17px; }
    .ranking-row small { color: var(--muted); font-size: 10px; }
    .ranking-score { text-align: right; }

    .catalog-heading { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; }
    .catalog-heading small { color: var(--muted); font-size: 11px; }
    .catalog-card {
      --visual-count: 15;
      --catalog-tile-width: min(24px, calc((100cqw - 34px) / var(--visual-count)));
      padding: 12px;
      position: relative;
      overflow: hidden;
      container-type: inline-size;
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 14px;
      background: linear-gradient(145deg, rgba(3,22,18,.78), rgba(0,0,0,.24));
      box-shadow: 0 6px 16px rgba(0,0,0,.16);
    }
    .catalog-question {
      width: 100%;
      padding: 0;
      border: 0;
      color: var(--ink);
      background: transparent;
      text-align: left;
      cursor: pointer;
    }
    .catalog-tiles-line {
      min-height: calc(var(--catalog-tile-width) * 1.363636 + 8px);
      margin-bottom: 9px;
      display: flex;
      align-items: flex-end;
      gap: 1px;
    }
    .catalog-hand, .catalog-melds, .catalog-meld-group { display: flex; align-items: flex-end; gap: 0; min-width: 0; }
    .catalog-melds { margin-left: 5px; padding-left: 5px; border-left: 1px solid rgba(242,210,123,.34); }
    .catalog-mini-tile {
      width: var(--catalog-tile-width);
      min-width: var(--catalog-tile-width);
      height: auto;
      display: block;
      flex: 0 0 var(--catalog-tile-width);
      border-radius: 2px;
      filter: drop-shadow(0 2px 1px rgba(0,0,0,.4));
    }
    .catalog-mini-tile.sideways {
      margin-inline: calc(var(--catalog-tile-width) * .181818);
      transform: translateY(calc(var(--catalog-tile-width) * .181818)) rotate(90deg);
      filter: drop-shadow(2px 0 1px rgba(0,0,0,.4));
    }
    .catalog-dora {
      margin-left: auto;
      padding-left: 5px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .catalog-dora small { color: var(--muted); font-size: 8px; line-height: 1; }
    .catalog-info { min-height: 60px; padding-right: 86px; }
    .catalog-title { color: var(--gold-light); font-size: 13px; }
    .catalog-scene { margin-left: 5px; color: var(--muted); font-size: 10px; }
    .catalog-rate { margin: 5px 0 0; color: var(--ink); font-size: 11px; }
    .catalog-rate-bar {
      height: 7px;
      margin-top: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(87,110,101,.18);
      box-shadow: inset 0 1px 2px rgba(0,0,0,.45);
    }
    .catalog-rate-bar > span {
      width: 0;
      height: 100%;
      display: block;
      border-radius: inherit;
      background: linear-gradient(90deg, #ef5b55 0%, #f3a55f 25%, #f2d77a 48%, #8fd39a 72%, #35c7a4 100%);
      box-shadow: 0 0 5px rgba(242,210,123,.18);
      transition: width .28s ease;
    }
    .catalog-favorite {
      min-width: 76px;
      min-height: 39px;
      padding: 6px 9px;
      position: absolute;
      right: 10px;
      bottom: 12px;
      z-index: 2;
      border: 1px solid rgba(242,210,123,.22);
      border-radius: 999px;
      color: var(--gold-light);
      background: rgba(20,31,27,.92);
      font-size: 12px;
      cursor: pointer;
    }
    .catalog-favorite.active {
      color: #251607;
      border-color: var(--gold-light);
      background: linear-gradient(#f2d27b, #b77c20);
    }

    .catalog-tools {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      margin-top: 12px;
    }

    .catalog-tools button.active {
      color: #251607;
      border-color: var(--gold-light);
      background: linear-gradient(#f2d27b, #b77c20);
    }

    .setting-group { margin-top: 15px; }
    .setting-group label { display: block; margin-bottom: 6px; color: var(--muted); font-size: 12px; }
    .setting-input {
      width: 100%;
      min-height: 43px;
      padding: 9px 11px;
      border: 1px solid rgba(242,210,123,.26);
      border-radius: 8px;
      color: var(--ink);
      background: rgba(0,0,0,.26);
      font: 700 14px "Yu Gothic", sans-serif;
    }

    .play-home {
      min-height: 32px;
      padding: 5px 8px;
      border: 1px solid rgba(242,210,123,.3);
      border-radius: 7px;
      color: var(--gold-light);
      background: rgba(0,0,0,.28);
      font-size: 10px;
      cursor: pointer;
    }

    .result-app { justify-content: center; }
    .result-panel { text-align: center; }
    .result-score { margin: 16px 0 4px; color: var(--gold-light); font-size: 46px; line-height: 1; }
    .result-detail { color: var(--muted); font-size: 12px; line-height: 1.8; }

    @media (min-width: 540px) {
      body { padding: 16px 0; }
      .app {
        min-height: calc(100dvh - 32px);
        border: 1px solid rgba(242,210,123,.14);
        border-radius: 16px;
        background: rgba(3,20,17,.34);
        box-shadow: 0 26px 80px rgba(0,0,0,.45);
      }
    }

    @media (max-height: 610px) and (orientation: portrait) {
      .app { gap: 6px; }
      .topbar { min-height: 40px; }
      .situation { padding-top: 7px; padding-bottom: 6px; }
      .hand-stage { padding-top: 12px; padding-bottom: 6px; }
      .decision { grid-template-columns: 1fr 1.15fr; }
      .selected-panel, .primary { min-height: 46px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="loading" id="loading">牌姿を準備しています…</div>
  </div>

  <script src="config.js"></script>
  <script>
    "use strict";

    const APP_VERSION = 16;
    const STORAGE_KEY = "zundamon-nanikiru-state-v2";
    const SUIT_NAMES = { m: "萬", p: "筒", s: "索" };
    const HONOR_NAMES = { 1: "東", 2: "南", 3: "西", 4: "北", 5: "白", 6: "發", 7: "中" };
    const WIND_NAMES = { east: "東", south: "南", west: "西", north: "北" };
    const app = document.getElementById("app");

    let questions = [];
    let playQuestions = [];
    let currentIndex = 0;
    let selectedIndex = null;
    let revealed = false;
    let currentScreen = "menu";
    let activeTab = "challenge";
    let problemSort = "default";
    let rankingMode = "ten";
    let lastResult = null;
    let state = loadState();

    document.documentElement.dataset.appVersion = String(APP_VERSION);

    function apiUrl(path) {
      const local = location.hostname === "127.0.0.1" || location.hostname === "localhost";
      const base = window.ZUNDAMON_CONFIG?.apiBaseUrl?.replace(/\/$/, "") || "";
      if (local || !base) return path;
      return `${base}${path.replace(/^\/api/, "")}`;
    }

    function mergeOverrides(baseQuestions, overrides) {
      const byId = new Map((Array.isArray(overrides) ? overrides : []).map(override => [Number(override.id), override]));
      return baseQuestions.map(question => {
        const override = byId.get(Number(question.id));
        return {
          ...question,
          correctDiscards: Array.isArray(override?.correctDiscards)
            ? override.correctDiscards
            : Array.isArray(question.correctDiscards) ? question.correctDiscards : [],
          explanation: typeof override?.explanation === "string" ? override.explanation : question.explanation,
          overridden: Boolean(override),
          overrideUpdatedAt: override?.overrideUpdatedAt || null,
        };
      });
    }

    function defaultState() {
      return {
        currentId: 1,
        responses: {},
        wrongIds: [],
        favoriteIds: [],
        questionStats: {},
        results: [],
        settings: { nickname: "" },
        session: null,
      };
    }

    function normalizeState(value) {
      const fallback = defaultState();
      const source = value && typeof value === "object" ? value : {};
      const normalized = {
        ...fallback,
        currentId: Number(source.currentId) || 1,
        responses: source.responses && typeof source.responses === "object" ? source.responses : {},
        wrongIds: Array.isArray(source.wrongIds) ? source.wrongIds.map(Number).filter(Number.isFinite) : [],
        favoriteIds: Array.isArray(source.favoriteIds) ? [...new Set(source.favoriteIds.map(Number).filter(Number.isFinite))] : [],
        questionStats: source.questionStats && typeof source.questionStats === "object" ? source.questionStats : {},
        results: Array.isArray(source.results) ? source.results.slice(0, 50) : [],
        settings: {
          ...fallback.settings,
          ...(source.settings && typeof source.settings === "object" ? source.settings : {}),
        },
        session: source.session && typeof source.session === "object" ? source.session : null,
      };
      if (normalized.session) {
        normalized.session.ids = Array.isArray(normalized.session.ids)
          ? normalized.session.ids.map(Number).filter(Number.isFinite)
          : [];
        normalized.session.position = Math.max(0, Number(normalized.session.position) || 0);
        normalized.session.answeredIds = Array.isArray(normalized.session.answeredIds)
          ? normalized.session.answeredIds.map(Number).filter(Number.isFinite)
          : [];
        normalized.session.responses = normalized.session.responses && typeof normalized.session.responses === "object"
          ? normalized.session.responses
          : {};
        if (!normalized.session.ids.length) normalized.session = null;
      }
      return normalized;
    }

    function loadState() {
      try {
        const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        return normalizeState(parsed);
      } catch {
        return defaultState();
      }
    }

    function saveState() {
      state.currentId = playQuestions[currentIndex]?.id || state.currentId || 1;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function tilePath(code) {
      if (code === "0m") return "tiles/aka3-66-90-l.png";
      if (code === "0p") return "tiles/aka1-66-90-l.png";
      if (code === "0s") return "tiles/aka2-66-90-l.png";
      const number = Number(code[0]);
      const suit = code[1];
      if (suit === "z") {
        const honorAsset = { 1: 1, 2: 2, 3: 3, 4: 4, 5: 6, 6: 5, 7: 7 };
        return `tiles/ji${honorAsset[number]}-66-90-l.png`;
      }
      const prefix = { m: "man", p: "pin", s: "sou" }[suit];
      return `tiles/${prefix}${number}-66-90-l.png`;
    }

    function tileName(code) {
      const number = Number(code[0]);
      const suit = code[1];
      if (suit === "z") return HONOR_NAMES[number] || code;
      return `${number === 0 ? "赤5" : number}${SUIT_NAMES[suit] || suit}`;
    }

    function roundName(value) {
      const match = /^(east|south|west|north)(\d+)$/.exec(value || "");
      return match ? `${WIND_NAMES[match[1]]}${match[2]}局` : "局面不明";
    }

    function stripDiscordMarkdown(value) {
      return (value || "")
        .replace(/\|\|/g, "")
        .replace(/\*\*/g, "")
        .replace(/__/g, "")
        .replace(/~~/g, "")
        .trim();
    }

    function appendLinkedText(container, value) {
      const text = stripDiscordMarkdown(value) || "この問題の解説はまだありません。";
      const chunks = text.split(/(https?:\/\/[^\s]+)/g);
      for (const chunk of chunks) {
        if (/^https?:\/\//.test(chunk)) {
          const link = document.createElement("a");
          link.href = chunk;
          link.target = "_blank";
          link.rel = "noopener noreferrer";
          link.textContent = chunk;
          container.append(link);
        } else {
          container.append(document.createTextNode(chunk));
        }
      }
    }

    function preloadTiles() {
      const codes = [];
      for (const suit of ["m", "p", "s"]) {
        codes.push(`0${suit}`);
        for (let number = 1; number <= 9; number += 1) codes.push(`${number}${suit}`);
      }
      for (let number = 1; number <= 7; number += 1) codes.push(`${number}z`);
      return Promise.all(codes.map(code => new Promise(resolve => {
        const image = new Image();
        image.onload = image.onerror = resolve;
        image.src = tilePath(code);
      })));
    }

    function sessionLabel(mode) {
      return mode === "ten" ? "10問" : mode === "all" ? "全問" : mode === "review" ? "復習" : "問題確認";
    }

    function formatElapsed(seconds) {
      const value = Math.max(0, Math.round(Number(seconds) || 0));
      const minutes = Math.floor(value / 60);
      const rest = value % 60;
      return minutes ? `${minutes}分${String(rest).padStart(2, "0")}秒` : `${rest}秒`;
    }

    function setScreen(screen) {
      currentScreen = screen;
      document.body.classList.toggle("menu-open", screen !== "play");
      document.body.classList.toggle("play-open", screen === "play");
      if (screen !== "play") document.body.classList.remove("reviewing");
    }

    function renderMenu(tab = activeTab) {
      activeTab = tab;
      setScreen("menu");
      app.className = "app menu-app";
      const tabs = [
        ["challenge", "⚡", "挑戦"],
        ["review", "↻", "復習"],
        ["problems", "▤", "問題一覧"],
        ["analysis", "↗", "自己分析"],
        ["ranking", "♛", "順位"],
      ];
      app.innerHTML = `
        <header class="menu-header">
          <p class="brand-kicker">ZUNDAMON</p>
          <h1>ずんだもん何切る</h1>
          <a class="menu-admin-entry" href="admin.html">管理画面</a>
          <button class="settings-tab-button${activeTab === "settings" ? " active" : ""}" id="settingsTab" type="button">
            <span>⚙</span><small>設定</small>
          </button>
        </header>
        <nav class="menu-tabs" aria-label="メニュー">
          ${tabs.map(([id, icon, label]) => `
            <button class="menu-tab${activeTab === id ? " active" : ""}" type="button" data-tab="${id}">
              <span>${icon}</span>${label}
            </button>`).join("")}
        </nav>
        <div id="menuPanel"></div>`;

      app.querySelectorAll("[data-tab]").forEach(button => {
        button.addEventListener("click", () => renderMenu(button.dataset.tab));
      });
      document.getElementById("settingsTab").addEventListener("click", () => {
        renderMenu(activeTab === "settings" ? "challenge" : "settings");
      });
      renderMenuPanel();
      window.scrollTo({ top: 0, behavior: "instant" });
    }

    function renderMenuPanel() {
      const panel = document.getElementById("menuPanel");
      if (activeTab === "challenge") renderChallengePanel(panel);
      if (activeTab === "review") renderReviewPanel(panel);
      if (activeTab === "problems") renderProblemPanel(panel);
      if (activeTab === "analysis") renderAnalysisPanel(panel);
      if (activeTab === "ranking") renderRankingPanel(panel);
      if (activeTab === "settings") renderSettingsPanel(panel);
    }

    function renderChallengePanel(panel) {
      const answered = Object.keys(state.responses).length;
      const activeSession = state.session && state.session.mode !== "single" ? state.session : null;
      panel.innerHTML = `
        <section class="menu-panel">
          <h2>挑戦</h2>
          <p class="menu-lead">出題タイプを選んですぐ開始できます。</p>
          <div class="mode-grid">
            <button class="mode-card" type="button" data-start-mode="ten">
              <span><strong>10問</strong><small>全問題からランダム出題</small></span><b>▶</b>
            </button>
            <button class="mode-card all" type="button" data-start-mode="all">
              <span><strong>全問</strong><small>${questions.length}問を問題番号順に出題</small></span><b>▶</b>
            </button>
          </div>
          ${activeSession ? `
            <div class="resume-card">
              <h3>途中の${sessionLabel(activeSession.mode)}</h3>
              <p class="menu-lead">${Object.keys(activeSession.responses || {}).length} / ${activeSession.ids.length} 問回答済み</p>
              <button class="menu-primary" id="resumeSession" type="button">続きから</button>
            </div>` : ""}
          <div class="summary-grid">
            <div class="summary-card"><strong>${answered}</strong><small>回答した問題</small></div>
            <div class="summary-card"><strong>${state.wrongIds.length}</strong><small>復習中</small></div>
          </div>
        </section>`;
      panel.querySelectorAll("[data-start-mode]").forEach(button => {
        button.addEventListener("click", () => startChallenge(button.dataset.startMode));
      });
      document.getElementById("resumeSession")?.addEventListener("click", resumeSession);
    }

    function renderReviewPanel(panel) {
      const reviewQuestions = state.wrongIds
        .map(id => questions.find(question => question.id === id))
        .filter(Boolean);
      panel.innerHTML = `
        <section class="menu-panel">
          <h2>復習</h2>
          <p class="menu-lead">不正解だった問題をまとめて解き直します。</p>
          <button class="menu-primary" id="startReview" type="button" ${reviewQuestions.length ? "" : "disabled"}>${reviewQuestions.length}問を復習</button>
          <div class="question-list" id="reviewList"></div>
        </section>`;
      document.getElementById("startReview").addEventListener("click", startReview);
      const list = document.getElementById("reviewList");
      if (!reviewQuestions.length) {
        list.innerHTML = `<div class="menu-note"><p class="menu-lead">復習する問題はありません。</p></div>`;
        return;
      }
      reviewQuestions.forEach(question => list.append(createQuestionRow(question)));
    }

    function renderProblemPanel(panel) {
      const sorted = [...questions].sort((a, b) => {
        if (problemSort === "default") return a.id - b.id;
        const aStat = state.questionStats[String(a.id)] || { total: 0, correct: 0 };
        const bStat = state.questionStats[String(b.id)] || { total: 0, correct: 0 };
        const aRate = aStat.total ? aStat.correct / aStat.total : 2;
        const bRate = bStat.total ? bStat.correct / bStat.total : 2;
        return aRate - bRate || bStat.total - aStat.total || a.id - b.id;
      });
      panel.innerHTML = `
        <section class="menu-panel">
          <div class="catalog-heading"><h2>問題一覧</h2><small>${questions.length}問</small></div>
          <p class="menu-lead">問題をタップすると、その問題だけ確認できます。</p>
          <div class="catalog-tools">
            <button class="menu-secondary${problemSort === "default" ? " active" : ""}" type="button" data-sort="default">通常順</button>
            <button class="menu-secondary${problemSort === "weak" ? " active" : ""}" type="button" data-sort="weak">苦手順</button>
          </div>
          <div class="question-list" id="problemList"></div>
        </section>`;
      panel.querySelectorAll("[data-sort]").forEach(button => {
        button.addEventListener("click", () => {
          problemSort = button.dataset.sort;
          renderMenu("problems");
        });
      });
      const list = document.getElementById("problemList");
      sorted.forEach(question => list.append(createCatalogCard(question)));
    }

    function createCatalogTile(code, className = "") {
      const image = document.createElement("img");
      image.className = `catalog-mini-tile${className ? ` ${className}` : ""}`;
      image.src = tilePath(code);
      image.alt = tileName(code);
      image.width = 66;
      image.height = 90;
      image.loading = "lazy";
      image.decoding = "async";
      return image;
    }

    function updateFavoriteButton(button, questionId) {
      const active = state.favoriteIds.includes(Number(questionId));
      button.classList.toggle("active", active);
      button.setAttribute("aria-pressed", active ? "true" : "false");
      button.setAttribute("aria-label", `第${questionId}問を${active ? "お気に入りから外す" : "お気に入りに追加"}`);
      button.textContent = active ? "★追加済" : "☆追加";
    }

    function toggleFavorite(questionId, button) {
      const favorites = new Set(state.favoriteIds);
      if (favorites.has(questionId)) favorites.delete(questionId); else favorites.add(questionId);
      state.favoriteIds = [...favorites];
      saveState();
      updateFavoriteButton(button, questionId);
    }

    function createCatalogCard(question) {
      const stat = state.questionStats[String(question.id)] || { total: 0, correct: 0 };
      const card = document.createElement("article");
      card.className = "catalog-card";
      const meldTileCount = (question.melds || []).reduce((total, meld) => total + (meld.tiles?.length || 0), 0);
      const sidewaysCount = (question.melds || []).filter(meld => meld.open && Number.isInteger(meld.calledIndex)).length;
      card.style.setProperty("--visual-count", String(Math.max(15, question.hand.length + meldTileCount + sidewaysCount * .36 + (question.dora ? 1.4 : 0))));

      const openButton = document.createElement("button");
      openButton.type = "button";
      openButton.className = "catalog-question";
      openButton.setAttribute("aria-label", `第${question.id}問を開く`);
      openButton.addEventListener("click", () => openSingleQuestion(question.id));

      const tilesLine = document.createElement("div");
      tilesLine.className = "catalog-tiles-line";
      const hand = document.createElement("div");
      hand.className = "catalog-hand";
      question.hand.forEach(code => hand.append(createCatalogTile(code)));
      tilesLine.append(hand);

      if (question.melds?.length) {
        const melds = document.createElement("div");
        melds.className = "catalog-melds";
        question.melds.forEach(meld => {
          const group = document.createElement("div");
          group.className = "catalog-meld-group";
          for (const [tileIndex, code] of (meld.tiles || []).entries()) {
            const sideways = meld.open && tileIndex === meld.calledIndex;
            group.append(createCatalogTile(code, sideways ? "sideways" : ""));
          }
          melds.append(group);
        });
        tilesLine.append(melds);
      }

      if (question.dora) {
        const dora = document.createElement("div");
        dora.className = "catalog-dora";
        const label = document.createElement("small");
        label.textContent = "ドラ";
        const image = createCatalogTile(question.dora);
        image.alt = `ドラ ${tileName(question.dora)}`;
        dora.append(label, image);
        tilesLine.append(dora);
      }

      const info = document.createElement("div");
      info.className = "catalog-info";
      const title = document.createElement("strong");
      title.className = "catalog-title";
      title.textContent = `No.${question.id}`;
      const scene = document.createElement("span");
      scene.className = "catalog-scene";
      scene.textContent = `${roundName(question.round)} ${WIND_NAMES[question.seat] || "―"}家 ${question.turn ?? "―"}巡目`;
      const rate = document.createElement("p");
      rate.className = "catalog-rate";
      const rateValue = stat.total ? Math.max(0, Math.min(100, Math.round(stat.correct / stat.total * 100))) : 0;
      rate.textContent = stat.total ? `正答率 ${rateValue}% (${stat.correct}/${stat.total})` : "正答率 -- (0/0)";
      const rateBar = document.createElement("div");
      rateBar.className = "catalog-rate-bar";
      rateBar.setAttribute("role", "progressbar");
      rateBar.setAttribute("aria-label", stat.total ? `第${question.id}問の正答率` : `第${question.id}問は未挑戦`);
      rateBar.setAttribute("aria-valuemin", "0");
      rateBar.setAttribute("aria-valuemax", "100");
      rateBar.setAttribute("aria-valuenow", String(rateValue));
      const rateFill = document.createElement("span");
      rateFill.style.width = `${rateValue}%`;
      rateBar.append(rateFill);
      info.append(title, scene, rate, rateBar);
      openButton.append(tilesLine, info);

      const favorite = document.createElement("button");
      favorite.type = "button";
      favorite.className = "catalog-favorite";
      updateFavoriteButton(favorite, question.id);
      favorite.addEventListener("click", () => toggleFavorite(question.id, favorite));
      card.append(openButton, favorite);
      return card;
    }

    function createQuestionRow(question, showRate = false) {
      const response = state.responses[String(question.id)];
      const stat = state.questionStats[String(question.id)] || { total: 0, correct: 0 };
      const row = document.createElement("button");
      row.type = "button";
      row.className = "question-row";
      const number = document.createElement("strong");
      number.textContent = `第${question.id}問`;
      const scene = document.createElement("span");
      scene.textContent = `${roundName(question.round)} ${WIND_NAMES[question.seat] || "―"}家 ${question.turn ?? "―"}巡目`;
      const status = document.createElement("em");
      if (showRate && stat.total) status.textContent = `${Math.round(stat.correct / stat.total * 100)}% (${stat.correct}/${stat.total})`;
      else if (!response) status.textContent = "未回答";
      else if (response.correct === true) status.textContent = "正解";
      else if (response.correct === false) status.textContent = "不正解";
      else status.textContent = "採点待ち";
      row.append(number, scene, status);
      row.addEventListener("click", () => openSingleQuestion(question.id));
      return row;
    }

    function renderAnalysisPanel(panel) {
      const stats = Object.values(state.questionStats);
      const attempts = stats.reduce((sum, stat) => sum + (Number(stat.total) || 0), 0);
      const correct = stats.reduce((sum, stat) => sum + (Number(stat.correct) || 0), 0);
      const rate = attempts ? Math.round(correct / attempts * 100) : 0;
      const recent = state.results.slice(0, 5);
      panel.innerHTML = `
        <section class="menu-panel">
          <h2>自己分析</h2>
          <p class="menu-lead">この端末に保存された回答履歴です。</p>
          <div class="summary-grid">
            <div class="summary-card"><strong>${Object.keys(state.responses).length}</strong><small>回答問題数</small></div>
            <div class="summary-card"><strong>${attempts ? `${rate}%` : "--"}</strong><small>採点済み正答率</small></div>
            <div class="summary-card"><strong>${attempts}</strong><small>採点回数</small></div>
            <div class="summary-card"><strong>${state.wrongIds.length}</strong><small>復習中</small></div>
          </div>
          <h3 style="margin-top:16px">最近の挑戦</h3>
          <div class="ranking-list" id="recentResults"></div>
        </section>`;
      const list = document.getElementById("recentResults");
      if (!recent.length) {
        list.innerHTML = `<div class="menu-note"><p class="menu-lead">まだ挑戦記録がありません。</p></div>`;
        return;
      }
      recent.forEach((result, index) => list.append(createResultRow(result, index + 1, false)));
    }

    function renderRankingPanel(panel) {
      const modes = [["ten", "10問"], ["all", "全問"]];
      const rows = state.results
        .filter(result => result.mode === rankingMode)
        .sort((a, b) => {
          const aRate = a.graded ? a.correct / a.graded : -1;
          const bRate = b.graded ? b.correct / b.graded : -1;
          return bRate - aRate || a.elapsedSeconds - b.elapsedSeconds;
        })
        .slice(0, 20);
      panel.innerHTML = `
        <section class="menu-panel">
          <h2>順位</h2>
          <p class="menu-lead">この端末内の挑戦記録を、正答率とタイムで並べます。</p>
          <div class="catalog-tools">
            ${modes.map(([id, label]) => `<button class="menu-secondary${rankingMode === id ? " active" : ""}" type="button" data-ranking-mode="${id}">${label}</button>`).join("")}
          </div>
          <div class="ranking-list" id="rankingList"></div>
        </section>`;
      panel.querySelectorAll("[data-ranking-mode]").forEach(button => {
        button.addEventListener("click", () => {
          rankingMode = button.dataset.rankingMode;
          renderMenu("ranking");
        });
      });
      const list = document.getElementById("rankingList");
      if (!rows.length) {
        list.innerHTML = `<div class="menu-note"><p class="menu-lead">この出題タイプの記録はまだありません。</p></div>`;
        return;
      }
      rows.forEach((result, index) => list.append(createResultRow(result, index + 1, true)));
    }

    function createResultRow(result, place, showPlace) {
      const row = document.createElement("div");
      row.className = "ranking-row";
      const rank = document.createElement("strong");
      rank.className = "ranking-place";
      rank.textContent = showPlace ? String(place) : sessionLabel(result.mode);
      const detail = document.createElement("div");
      const title = document.createElement("div");
      title.textContent = `${result.correct ?? 0} / ${result.graded ?? 0} 正解`;
      const date = document.createElement("small");
      date.textContent = new Date(result.finishedAt).toLocaleString("ja-JP", { month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" });
      detail.append(title, date);
      const score = document.createElement("div");
      score.className = "ranking-score";
      score.textContent = result.graded ? `${Math.round(result.correct / result.graded * 100)}%` : "採点待ち";
      const time = document.createElement("small");
      time.textContent = formatElapsed(result.elapsedSeconds);
      score.append(document.createElement("br"), time);
      row.append(rank, detail, score);
      return row;
    }

    function renderSettingsPanel(panel) {
      panel.innerHTML = `
        <section class="menu-panel">
          <h2>設定</h2>
          <div class="setting-group">
            <label for="nicknameInput">ニックネーム</label>
            <input class="setting-input" id="nicknameInput" maxlength="16" autocomplete="nickname">
          </div>
          <div class="setting-group">
            <h3>バックアップ</h3>
            <p class="menu-lead">回答履歴・復習・設定をファイルで保存、復元できます。</p>
            <div class="menu-actions">
              <button class="menu-secondary" id="backupDownload" type="button">保存</button>
              <button class="menu-secondary" id="backupRestore" type="button">復元</button>
              <input id="backupFile" type="file" accept="application/json" hidden>
            </div>
          </div>
          <div class="setting-group">
            <h3>管理</h3>
            <div class="menu-actions">
              <a class="menu-secondary" href="admin.html" style="display:inline-flex;align-items:center;text-decoration:none">管理画面</a>
              <button class="menu-danger" id="clearProgress" type="button">進捗をリセット</button>
            </div>
          </div>
        </section>`;
      const nickname = document.getElementById("nicknameInput");
      nickname.value = state.settings.nickname || "";
      nickname.addEventListener("input", () => {
        state.settings.nickname = nickname.value.slice(0, 16);
        saveState();
      });
      document.getElementById("backupDownload").addEventListener("click", downloadBackup);
      document.getElementById("backupRestore").addEventListener("click", () => document.getElementById("backupFile").click());
      document.getElementById("backupFile").addEventListener("change", restoreBackup);
      document.getElementById("clearProgress").addEventListener("click", () => {
        if (!window.confirm("回答履歴・復習・順位をすべて消去します。よろしいですか？")) return;
        state = defaultState();
        saveState();
        renderMenu("settings");
      });
    }

    function downloadBackup() {
      saveState();
      const payload = JSON.stringify({ app: "zundamon-nanikiru", version: APP_VERSION, savedAt: new Date().toISOString(), state }, null, 2);
      const url = URL.createObjectURL(new Blob([payload], { type: "application/json" }));
      const link = document.createElement("a");
      link.href = url;
      link.download = `zundamon-nanikiru-backup-${new Date().toISOString().slice(0, 10)}.json`;
      link.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    async function restoreBackup(event) {
      const file = event.target.files?.[0];
      if (!file) return;
      try {
        const parsed = JSON.parse(await file.text());
        state = normalizeState(parsed.state || parsed);
        state.session = null;
        saveState();
        renderMenu("settings");
      } catch {
        window.alert("バックアップファイルを読み込めませんでした。");
      }
    }

    function shuffledIds() {
      const ids = questions.map(question => question.id);
      for (let index = ids.length - 1; index > 0; index -= 1) {
        const swap = Math.floor(Math.random() * (index + 1));
        [ids[index], ids[swap]] = [ids[swap], ids[index]];
      }
      return ids;
    }

    function createSession(mode, ids) {
      state.session = {
        mode,
        ids,
        position: 0,
        startedAt: new Date().toISOString(),
        answeredIds: [],
        responses: {},
      };
      saveState();
      resumeSession();
    }

    function startChallenge(mode) {
      const ids = mode === "ten" ? shuffledIds().slice(0, Math.min(10, questions.length)) : questions.map(question => question.id);
      createSession(mode, ids);
    }

    function startReview() {
      const ids = state.wrongIds.filter(id => questions.some(question => question.id === id));
      if (ids.length) createSession("review", ids);
    }

    function openSingleQuestion(id) {
      createSession("single", [Number(id)]);
    }

    function resumeSession() {
      if (!state.session) return renderMenu("challenge");
      playQuestions = state.session.ids
        .map(id => questions.find(question => question.id === id))
        .filter(Boolean);
      if (!playQuestions.length) {
        state.session = null;
        saveState();
        return renderMenu("challenge");
      }
      state.session.ids = playQuestions.map(question => question.id);
      currentIndex = Math.min(Math.max(0, state.session.position || 0), playQuestions.length - 1);
      setScreen("play");
      app.className = "app play-app";
      buildPlayShell();
      renderQuestion();
    }

    function goMenu() {
      if (state.session?.mode === "single") state.session = null;
      else if (state.session) state.session.position = currentIndex;
      saveState();
      renderMenu("challenge");
    }

    function buildPlayShell() {
      app.innerHTML = `
        <header class="topbar">
          <div>
            <p class="brand-kicker">ZUNDAMON</p>
            <h1>ずんだもん何切る</h1>
          </div>
          <div class="top-actions"><button class="play-home" id="homeButton" type="button">メニュー</button><div class="counter" id="counter"></div></div>
        </header>
        <div class="progress" aria-label="回答進捗"><span id="progressBar"></span></div>
        <main class="board">
          <section class="situation" aria-label="局面">
            <div class="situation-main">
              <div>
                <div class="round-line">
                  <strong class="round" id="round"></strong>
                  <span class="seat" id="seat"></span>
                  <span class="turn" id="turn"></span>
                </div>
                <div class="sub-line" id="subLine"></div>
              </div>
              <div class="dora-box">
                <span class="dora-label">ドラ</span>
                <img class="dora-tile" id="dora" alt="">
              </div>
            </div>
          </section>

          <section class="hand-stage" aria-label="牌姿">
            <div class="tiles-line" id="tilesLine">
              <div class="hand-tiles" id="handTiles" role="group" aria-label="打牌を選択"></div>
              <div class="meld-tiles" id="meldTiles" aria-label="副露"></div>
            </div>
            <div class="hand-caption" id="handCaption">切る牌をタップしてください</div>
          </section>

          <section class="decision" id="decision">
            <div class="selected-panel">
              <small>選択中</small>
              <span class="selected-name" id="selectedName">未選択</span>
            </div>
            <button class="primary" id="confirmButton" type="button" disabled>この牌を切る</button>
          </section>

          <section class="review" id="review" aria-live="polite">
            <div class="answer-feedback" id="answerFeedback" hidden><strong id="judgment"></strong><span id="correctAnswer"></span></div>
            <h2>解説</h2>
            <div class="explanation" id="explanation"></div>
            <div class="review-actions">
              <button class="secondary" id="retryButton" type="button">選び直す</button>
              <button class="next-button" id="nextButton" type="button">次の問題</button>
            </div>
            <a class="source-link" id="sourceLink" target="_blank" rel="noopener noreferrer">Discordの元投稿を開く</a>
          </section>

          <nav class="bottom-nav" aria-label="問題移動">
            <button class="nav-button" id="previousNav" type="button">← 前へ</button>
            <div class="answered-count"><strong id="answeredCount"></strong><br>回答済み</div>
            <button class="nav-button" id="nextNav" type="button">次へ →</button>
          </nav>
        </main>`;

      document.getElementById("confirmButton").addEventListener("click", confirmSelection);
      document.getElementById("retryButton").addEventListener("click", retryQuestion);
      document.getElementById("nextButton").addEventListener("click", nextQuestionOrFinish);
      document.getElementById("previousNav").addEventListener("click", () => moveQuestion(-1));
      document.getElementById("nextNav").addEventListener("click", () => moveQuestion(1));
      document.getElementById("homeButton").addEventListener("click", goMenu);
    }

    function renderQuestion() {
      const question = playQuestions[currentIndex];
      const response = state.session?.responses?.[String(question.id)];
      selectedIndex = response && Number.isInteger(response.index) ? response.index : null;
      revealed = Boolean(response);

      document.getElementById("counter").textContent = `第 ${currentIndex + 1} / ${playQuestions.length} 問`;
      document.getElementById("round").textContent = roundName(question.round);
      document.getElementById("seat").textContent = `${WIND_NAMES[question.seat] || "―"}家`;
      document.getElementById("turn").textContent = `${question.turn ?? "―"}巡目`;
      document.getElementById("dora").src = tilePath(question.dora);
      document.getElementById("dora").alt = `ドラ ${tileName(question.dora)}`;

      const subItems = [];
      if (question.honba !== null && question.honba !== undefined) subItems.push(`${question.honba}本場`);
      if (question.points) subItems.push(`${Number(question.points).toLocaleString("ja-JP")}点`);
      if (question.melds?.length) subItems.push(question.melds[0].open ? "副露あり" : "暗槓あり");
      document.getElementById("subLine").textContent = subItems.join("　") || " ";

      renderHand(question);
      renderDecision(question);
      renderReview(question);
      renderProgress();

      document.getElementById("previousNav").disabled = currentIndex === 0;
      document.getElementById("nextNav").disabled = currentIndex === playQuestions.length - 1;
      document.getElementById("nextButton").disabled = false;
      document.getElementById("nextButton").textContent = currentIndex === playQuestions.length - 1 && state.session?.mode !== "single" ? "結果へ" : currentIndex === playQuestions.length - 1 ? "メニューへ" : "次の問題";
      if (state.session) state.session.position = currentIndex;
      saveState();
      window.scrollTo({ top: 0, behavior: "instant" });
    }

    function renderHand(question) {
      const hand = document.getElementById("handTiles");
      const melds = document.getElementById("meldTiles");
      hand.innerHTML = "";
      melds.innerHTML = "";

      question.hand.forEach((code, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `tile-button${selectedIndex === index ? " selected" : ""}`;
        button.dataset.index = String(index);
        button.setAttribute("aria-label", `${tileName(code)}を切る`);
        button.setAttribute("aria-pressed", selectedIndex === index ? "true" : "false");
        button.disabled = revealed;
        const image = document.createElement("img");
        image.src = tilePath(code);
        image.alt = tileName(code);
        image.width = 66;
        image.height = 90;
        button.append(image);
        button.addEventListener("click", () => selectTile(index));
        hand.append(button);
      });

      let meldTileCount = 0;
      for (const meld of question.melds || []) {
        const group = document.createElement("div");
        group.className = "meld-group";
        group.title = meld.type === "kan" ? "槓" : meld.type === "chi" ? "チー" : "ポン";
        meld.tiles.forEach((code, tileIndex) => {
          const image = document.createElement("img");
          image.className = "meld-tile";
          if (meld.open && tileIndex === meld.calledIndex) image.classList.add("sideways");
          image.src = tilePath(code);
          image.alt = tileName(code);
          image.width = 66;
          image.height = 90;
          group.append(image);
          meldTileCount += 1;
        });
        melds.append(group);
      }
      melds.hidden = meldTileCount === 0;
      const sidewaysCount = (question.melds || []).filter(meld => meld.open && Number.isInteger(meld.calledIndex)).length;
      document.getElementById("tilesLine").style.setProperty("--visual-count", Math.max(14, question.hand.length + meldTileCount + sidewaysCount * .36));
    }

    function selectTile(index) {
      if (revealed) return;
      selectedIndex = index;
      renderHand(playQuestions[currentIndex]);
      renderDecision(playQuestions[currentIndex]);
    }

    function renderDecision(question) {
      const selected = selectedIndex === null ? null : question.hand[selectedIndex];
      document.getElementById("selectedName").textContent = selected ? tileName(selected) : "未選択";
      document.getElementById("handCaption").innerHTML = selected
        ? `<strong>${tileName(selected)}</strong> を選択中`
        : "切る牌をタップしてください";
      document.getElementById("confirmButton").disabled = selectedIndex === null || revealed;
      document.getElementById("decision").hidden = revealed;
    }

    function confirmSelection() {
      if (selectedIndex === null || revealed) return;
      const question = playQuestions[currentIndex];
      const id = String(question.id);
      const correctDiscards = Array.isArray(question.correctDiscards) ? question.correctDiscards : [];
      const graded = correctDiscards.length > 0;
      const tile = question.hand[selectedIndex];
      const correct = graded ? correctDiscards.includes(tile) : null;
      const answeredAt = new Date().toISOString();
      const response = {
        tile,
        index: selectedIndex,
        graded,
        correct,
        answeredAt,
      };
      const alreadyAnswered = state.session?.answeredIds?.includes(question.id);
      state.responses[id] = response;
      if (state.session) {
        state.session.responses[id] = response;
        if (!alreadyAnswered) state.session.answeredIds.push(question.id);
      }
      if (graded && !alreadyAnswered) {
        const stat = state.questionStats[id] || { total: 0, correct: 0 };
        stat.total += 1;
        if (correct) stat.correct += 1;
        state.questionStats[id] = stat;
      }
      if (graded) {
        const wrong = new Set(state.wrongIds);
        if (correct) wrong.delete(question.id);
        else wrong.add(question.id);
        state.wrongIds = [...wrong];
      }
      revealed = true;
      saveState();
      renderHand(question);
      renderDecision(question);
      renderReview(question);
      renderProgress();
    }

    function retryQuestion() {
      const question = playQuestions[currentIndex];
      const id = String(question.id);
      const sessionResponse = state.session?.responses?.[id];
      if (state.responses[id]?.answeredAt === sessionResponse?.answeredAt) delete state.responses[id];
      if (state.session?.responses) delete state.session.responses[id];
      selectedIndex = null;
      revealed = false;
      saveState();
      renderHand(question);
      renderDecision(question);
      renderReview(question);
      renderProgress();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderReview(question) {
      const review = document.getElementById("review");
      const explanation = document.getElementById("explanation");
      const feedback = document.getElementById("answerFeedback");
      review.classList.toggle("open", revealed);
      document.body.classList.toggle("reviewing", revealed);
      explanation.innerHTML = "";
      if (revealed) appendLinkedText(explanation, question.explanation);
      const correctDiscards = Array.isArray(question.correctDiscards) ? question.correctDiscards : [];
      const response = state.session?.responses?.[String(question.id)];
      if (revealed && response && correctDiscards.length) {
        const correct = correctDiscards.includes(response.tile);
        feedback.hidden = false;
        feedback.className = `answer-feedback ${correct ? "correct" : "incorrect"}`;
        document.getElementById("judgment").textContent = correct ? "○ 正解" : "× 不正解";
        document.getElementById("correctAnswer").textContent = `正解：${correctDiscards.map(tileName).join("・")}`;
      } else {
        feedback.hidden = true;
        feedback.className = "answer-feedback";
      }
      const sourceLink = document.getElementById("sourceLink");
      sourceLink.href = question.discordMessageUrl;
    }

    function renderProgress() {
      const answered = Object.keys(state.session?.responses || {}).length;
      document.getElementById("answeredCount").textContent = `${answered} / ${playQuestions.length}`;
      document.getElementById("progressBar").style.width = `${playQuestions.length ? answered / playQuestions.length * 100 : 0}%`;
    }

    function moveQuestion(delta) {
      const next = currentIndex + delta;
      if (next < 0 || next >= playQuestions.length) return;
      currentIndex = next;
      if (state.session) state.session.position = currentIndex;
      renderQuestion();
    }

    function nextQuestionOrFinish() {
      if (currentIndex < playQuestions.length - 1) return moveQuestion(1);
      if (state.session?.mode === "single") return goMenu();
      finishSession();
    }

    function finishSession() {
      if (!state.session) return renderMenu("challenge");
      const finishedSession = state.session;
      const sessionQuestions = finishedSession.ids
        .map(id => questions.find(question => question.id === id))
        .filter(Boolean);
      const responses = finishedSession.responses || {};
      const gradedResponses = sessionQuestions
        .map(question => responses[String(question.id)])
        .filter(response => response?.graded);
      const answered = sessionQuestions.filter(question => responses[String(question.id)]).length;
      const correct = gradedResponses.filter(response => response.correct).length;
      const elapsedSeconds = Math.max(0, (Date.now() - new Date(finishedSession.startedAt).getTime()) / 1000);
      const result = {
        mode: finishedSession.mode,
        total: sessionQuestions.length,
        answered,
        graded: gradedResponses.length,
        correct,
        elapsedSeconds,
        finishedAt: new Date().toISOString(),
      };
      if (result.mode === "ten" || result.mode === "all") {
        state.results.unshift(result);
        state.results = state.results.slice(0, 50);
      }
      state.session = null;
      lastResult = result;
      saveState();
      renderResult(result);
    }

    function renderResult(result) {
      setScreen("result");
      app.className = "app menu-app result-app";
      const percentage = result.graded ? Math.round(result.correct / result.graded * 100) : null;
      app.innerHTML = `
        <section class="menu-panel result-panel">
          <p class="brand-kicker">RESULT</p>
          <h2>${sessionLabel(result.mode)} 完了</h2>
          <div class="result-score">${percentage === null ? "--" : `${percentage}%`}</div>
          <p class="result-detail">${result.answered} / ${result.total} 問回答<br>${result.correct} / ${result.graded} 問正解<br>タイム ${formatElapsed(result.elapsedSeconds)}${result.graded < result.answered ? `<br>採点待ち ${result.answered - result.graded}問` : ""}</p>
          <div class="menu-actions" style="justify-content:center;margin-top:18px">
            <button class="menu-secondary" id="resultMenu" type="button">メニュー</button>
            ${result.mode === "ten" || result.mode === "all" ? `<button class="menu-primary" id="resultRetry" type="button">再挑戦</button>` : ""}
          </div>
        </section>`;
      document.getElementById("resultMenu").addEventListener("click", () => renderMenu("challenge"));
      document.getElementById("resultRetry")?.addEventListener("click", () => startChallenge(result.mode));
      window.scrollTo({ top: 0, behavior: "instant" });
    }

    function showFatal(error) {
      document.body.classList.add("reviewing");
      app.innerHTML = `<div class="fatal"><strong>問題データを読み込めませんでした。</strong><br><small></small></div>`;
      app.querySelector("small").textContent = error?.message || String(error);
    }

    document.addEventListener("keydown", event => {
      if (!questions.length || currentScreen !== "play") return;
      if (event.key === "ArrowLeft") moveQuestion(-1);
      if (event.key === "ArrowRight") moveQuestion(1);
      if (event.key === "Enter" && selectedIndex !== null && !revealed) confirmSelection();
      if (event.key === "Escape") goMenu();
    });

    const baseQuestionsRequest = fetch("public/questions.json", { cache: "no-store" }).then(response => {
      if (!response.ok) throw new Error(`questions.json: ${response.status}`);
      return response.json();
    });
    const overridesRequest = fetch(apiUrl("/api/overrides"), { cache: "no-store" })
      .then(response => response.ok ? response.json() : [])
      .catch(() => []);

    Promise.all([
      baseQuestionsRequest,
      overridesRequest,
      preloadTiles()
    ]).then(([baseQuestions, overrides]) => {
      questions = mergeOverrides(baseQuestions, overrides)
        .filter(question => Array.isArray(question.hand) && question.hand.length);
      if (!questions.length) throw new Error("構造化済みの問題がありません。 ");
      state = normalizeState(state);
      renderMenu("challenge");
    }).catch(showFatal);
  </script>
</body>
</html>
