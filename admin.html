<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#06110f">
  <title>管理画面｜ずんだもん何切る</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f6f2df;
      --muted: #9aa9a4;
      --felt-0: #06110f;
      --felt-1: #0b2f28;
      --felt-2: #0f493c;
      --gold: #d8a83c;
      --gold-light: #f2d27b;
      --orange: #b65a22;
      --danger: #b84b3c;
      font-family: "Yu Mincho", "YuMincho", "Hiragino Mincho ProN", "HGS明朝E", "MS PMincho", serif;
      font-weight: 900;
    }

    * { box-sizing: border-box; }
    [hidden] { display: none !important; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      min-width: 320px;
      color: var(--ink);
      background:
        linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.014) 1px, transparent 1px),
        radial-gradient(circle at 50% -10%, #17604e, var(--felt-1) 38%, var(--felt-0) 82%);
      background-size: 24px 24px, 24px 24px, auto;
    }
    button, input, textarea { font: inherit; }
    button { color: inherit; cursor: pointer; }

    .shell {
      width: min(100%, 52rem);
      min-height: 100dvh;
      margin: 0 auto;
      padding: max(14px, env(safe-area-inset-top)) 12px max(18px, env(safe-area-inset-bottom));
    }
    .header { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .kicker { margin: 0; color: var(--gold-light); font-size: 10px; letter-spacing: .22em; }
    h1 { margin: 2px 0 0; font-size: clamp(25px, 7vw, 36px); text-shadow: 0 3px 0 #03110e; }
    .back {
      padding: 9px 12px;
      border: 1px solid rgba(242,210,123,.34);
      border-radius: 7px;
      color: var(--ink);
      background: rgba(0,0,0,.22);
      text-decoration: none;
    }

    .login {
      width: min(100%, 26rem);
      margin: clamp(54px, 13vh, 110px) auto 0;
      padding: 22px;
      border: 1px solid rgba(242,210,123,.3);
      border-radius: 12px;
      background: linear-gradient(145deg, rgba(15,73,60,.9), rgba(3,22,18,.94));
      box-shadow: 0 18px 55px rgba(0,0,0,.45);
    }
    .login h2 { margin: 0 0 8px; color: var(--gold-light); }
    .login p { margin: 0 0 16px; color: var(--muted); font-family: sans-serif; font-size: 13px; font-weight: 600; line-height: 1.6; }
    label { display: block; margin-bottom: 6px; color: var(--gold-light); font-size: 13px; }
    input, textarea {
      width: 100%;
      border: 1px solid rgba(242,210,123,.3);
      border-radius: 7px;
      color: var(--ink);
      background: rgba(0,0,0,.34);
      outline: none;
    }
    input { min-height: 46px; padding: 9px 11px; }
    textarea { min-height: 190px; padding: 11px; resize: vertical; font-family: "Yu Gothic", sans-serif; font-weight: 600; line-height: 1.6; }
    input:focus, textarea:focus { border-color: var(--gold-light); box-shadow: 0 0 0 2px rgba(242,210,123,.12); }
    .format-toolbar { display: flex; gap: 7px; margin: -2px 0 7px; }
    .format-button { min-height: 34px; padding: 4px 11px; border: 1px solid rgba(242,210,123,.36); border-radius: 6px; color: var(--ink); background: rgba(0,0,0,.28); }
    .format-button strong { font-family: sans-serif; }
    .format-button.red { color: #ff7165; }
    .primary {
      width: 100%; min-height: 46px; margin-top: 12px; border: 1px solid #efad5e; border-radius: 7px;
      background: linear-gradient(#d27735, #8c3e17); box-shadow: 0 3px 0 #4b210c;
    }
    .message { min-height: 20px; margin-top: 10px; color: #ffd09e; font-family: sans-serif; font-size: 12px; font-weight: 700; }
    .message.success { color: #9ee6b8; }

    .toolbar {
      margin: 16px 0 10px;
      padding: 10px;
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 9px;
      border: 1px solid rgba(242,210,123,.22);
      border-radius: 9px;
      background: rgba(3,22,18,.74);
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(10px);
    }
    .logout { padding: 0 14px; border: 1px solid rgba(242,210,123,.3); border-radius: 7px; background: rgba(0,0,0,.28); }
    .add-question { padding: 0 12px; border: 1px solid #efad5e; border-radius: 7px; background: linear-gradient(#cf7434, #8b3d16); }
    .summary-line { margin: 0 2px 10px; color: var(--muted); font-size: 12px; }

    .question-list { display: grid; gap: 7px; }
    details {
      overflow: clip;
      border: 1px solid rgba(242,210,123,.2);
      border-radius: 9px;
      background: linear-gradient(145deg, rgba(15,73,60,.7), rgba(3,22,18,.82));
    }
    details[open] { border-color: rgba(242,210,123,.45); box-shadow: 0 10px 28px rgba(0,0,0,.28); }
    details.reviewed { border-color: rgba(126,225,157,.5); }
    summary {
      min-height: 50px;
      padding: 10px 12px;
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      list-style: none;
    }
    summary::-webkit-details-marker { display: none; }
    .qid { color: var(--gold-light); font-size: 17px; }
    .qcontext { color: var(--muted); font-size: 12px; }
    .answer-state { font-size: 11px; text-align: right; }
    .answer-state.unset { color: #d0a0a0; }
    .answer-state.override { color: #9ee6b8; }
    .review-check {
      min-height: 32px;
      padding: 4px 7px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid rgba(242,210,123,.25);
      border-radius: 6px;
      color: var(--ink);
      background: rgba(0,0,0,.24);
      font-family: sans-serif;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
    }
    .review-check input {
      width: 20px;
      min-height: 20px;
      margin: 0;
      padding: 0;
      accent-color: #d8a83c;
    }
    .review-check:has(input:checked) { border-color: #79ca98; color: #9ee6b8; }
    .review-check:has(input:disabled) { opacity: .58; cursor: wait; }
    .editor { --admin-tile-width: 39px; padding: 13px; border-top: 1px solid rgba(242,210,123,.18); }
    .field-title { margin: 0 0 7px; color: var(--gold-light); font-size: 13px; }
    .hint { margin: 0 0 10px; color: var(--muted); font-family: sans-serif; font-size: 11px; font-weight: 600; }

    .admin-dora-preview { margin-bottom: 16px; }
    .admin-dora-tile {
      width: var(--admin-tile-width);
      height: auto;
      display: block;
      border-radius: 2px;
      filter: drop-shadow(0 3px 2px rgba(0,0,0,.42));
    }

    .answer-tiles { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 16px; }
    .answer-tile {
      width: var(--admin-tile-width);
      flex: 0 0 var(--admin-tile-width);
      padding: 0;
      border: 2px solid transparent;
      border-radius: 4px;
      background: transparent;
      position: relative;
    }
    .answer-tile img { display: block; width: 100%; height: auto; border-radius: 2px; pointer-events: none; }
    .answer-tile.selected { border-color: var(--gold-light); transform: translateY(-4px); box-shadow: 0 0 10px rgba(242,210,123,.65); }
    .answer-tile.selected::after {
      content: "○"; position: absolute; right: -5px; top: -9px; color: #d7352b; font-size: 18px; text-shadow: 0 1px #fff;
    }
    .tile-editor-row { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
    .edit-tile { width: var(--admin-tile-width); flex: 0 0 var(--admin-tile-width); padding: 0; border: 2px solid transparent; border-radius: 4px; background: transparent; }
    .edit-tile img, .palette-tile img { width: 100%; height: auto; display: block; border-radius: 2px; pointer-events: none; }
    .edit-tile.target { border-color: var(--gold-light); transform: translateY(-4px); box-shadow: 0 0 9px rgba(242,210,123,.55); }
    .edit-tile.sideways { margin-inline: calc(var(--admin-tile-width) * .181818); transform: translateY(calc(var(--admin-tile-width) * .181818)) rotate(90deg); }
    .tile-controls { display: flex; gap: 7px; margin: 6px 0 12px; }
    .tile-controls button, .meld-add, .meld-remove { min-height: 34px; padding: 5px 8px; border: 1px solid rgba(242,210,123,.28); border-radius: 6px; background: rgba(0,0,0,.28); font-size: 12px; }
    .tile-palette { display: grid; grid-template-columns: repeat(10, var(--admin-tile-width)); gap: 4px; overflow-x: auto; padding-bottom: 6px; }
    .palette-tile { width: var(--admin-tile-width); padding: 0; border: 1px solid rgba(242,210,123,.2); border-radius: 4px; background: #071510; }
    .meld-edit { display: flex; align-items: flex-end; gap: 6px; margin-bottom: 8px; }
    .meld-edit select { min-height: 32px; color: var(--ink); background: #0a211c; border: 1px solid rgba(242,210,123,.25); border-radius: 5px; }
    .meld-preview { margin: -2px 0 16px; }
    .meld-preview .field-title { margin-bottom: 10px; }
    .admin-melds { display: flex; align-items: flex-end; gap: 8px; padding: 1px 5px 8px; }
    .admin-meld-group { display: flex; align-items: flex-end; flex: none; gap: 0; }
    .admin-meld-tile {
      width: var(--admin-tile-width);
      min-width: var(--admin-tile-width);
      height: auto;
      display: block;
      flex: 0 0 var(--admin-tile-width);
      border-radius: 2px;
      filter: drop-shadow(0 3px 2px rgba(0,0,0,.42));
    }
    .admin-meld-tile.sideways {
      margin-inline: calc(var(--admin-tile-width) * .181818);
      transform: translateY(calc(var(--admin-tile-width) * .181818)) rotate(90deg);
      filter: drop-shadow(3px 0 2px rgba(0,0,0,.42));
    }
    .editor-actions { margin-top: 11px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .save, .restore { min-height: 44px; border-radius: 7px; }
    .save { border: 1px solid #efad5e; background: linear-gradient(#cf7434, #8b3d16); }
    .restore { border: 1px solid rgba(255,255,255,.18); background: rgba(0,0,0,.3); }
    .restore:disabled { opacity: .3; cursor: default; }
    .item-message { min-height: 20px; margin: 8px 0 0; color: #ffd09e; font-family: sans-serif; font-size: 12px; font-weight: 700; }
    .item-message.success { color: #9ee6b8; }
    .empty { padding: 32px; text-align: center; color: var(--muted); }

    @media (max-width: 520px) {
      .shell { padding-inline: 9px; }
      .back { padding: 8px 9px; font-size: 12px; }
      summary { grid-template-columns: auto 1fr auto; }
      .review-check { grid-column: 3; grid-row: 1; }
      .answer-state { grid-column: 1 / -1; text-align: left; }
      .editor { --admin-tile-width: min(42px, calc((100vw - 68px) / 7)); }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="header">
      <div><p class="kicker">ADMIN</p><h1>問題管理</h1></div>
      <a class="back" href="./">アプリへ戻る</a>
    </header>

    <section class="login" id="loginPanel">
      <h2>管理者ログイン</h2>
      <p>管理パスワードはこの画面内だけで保持し、ブラウザには保存しません。</p>
      <form id="loginForm">
        <label for="password">管理パスワード</label>
        <input id="password" type="password" autocomplete="current-password" required>
        <button class="primary" type="submit">ログイン</button>
        <div class="message" id="loginMessage" aria-live="polite"></div>
      </form>
    </section>

    <section id="adminPanel" hidden>
      <div class="toolbar">
        <input id="search" type="search" placeholder="問題番号・正解牌・解説を検索">
        <button class="add-question" id="addQuestion" type="button">＋追加</button>
        <button class="logout" id="logout" type="button">終了</button>
      </div>
      <p class="summary-line" id="summaryLine"></p>
      <div class="question-list" id="questionList"></div>
    </section>
  </main>

  <script src="config.js"></script>
  <script>
    "use strict";
    const SUIT_NAMES = { m: "萬", p: "筒", s: "索" };
    const HONOR_NAMES = { 1: "東", 2: "南", 3: "西", 4: "北", 5: "白", 6: "發", 7: "中" };
    const WIND_NAMES = { east: "東", south: "南", west: "西", north: "北" };
    const TILE_ASSET_VERSION = "41";
    let adminPassword = "";
    let baseQuestions = [];
    let questions = [];

    function tilePath(code) {
      const cacheVersion = `?v=${TILE_ASSET_VERSION}`;
      if (code === "0m") return "tiles/aka1-66-90-l.png" + cacheVersion;
      if (code === "0p") return "tiles/aka2-66-90-l.png" + cacheVersion;
      if (code === "0s") return "tiles/aka3-66-90-l.png" + cacheVersion;
      const number = Number(code[0]);
      const suit = code[1];
      if (suit === "z") return `tiles/ji${number}-66-90-l.png${cacheVersion}`;
      return `tiles/${{ m: "man", p: "pin", s: "sou" }[suit]}${number}-66-90-l.png${cacheVersion}`;
    }

    function tileName(code) {
      const number = Number(code[0]);
      if (code[1] === "z") return HONOR_NAMES[number] || code;
      return `${number === 0 ? "赤5" : number}${SUIT_NAMES[code[1]] || code[1]}`;
    }

    function roundName(value) {
      const match = /^(east|south|west|north)(\d+)$/.exec(value || "");
      return match ? `${WIND_NAMES[match[1]]}${match[2]}局` : "局面不明";
    }

    function apiUrl(path) {
      const local = location.hostname === "127.0.0.1" || location.hostname === "localhost";
      const base = window.ZUNDAMON_CONFIG?.apiBaseUrl?.replace(/\/$/, "") || "";
      if (local || !base) return path;
      const remotePath = path.replace(/^\/api\/admin/, "").replace(/^\/api/, "");
      return `${base}${remotePath}`;
    }

    function mergeExplanationWithVideoSummary(baseExplanation, overrideExplanation) {
      const base = String(baseExplanation || "").trim();
      const current = String(overrideExplanation ?? baseExplanation ?? "").trim();
      const summary = base.match(/(?:^|\n\n)【動画要約】\n[\s\S]*$/)?.[0]?.trim() || "";
      if (!summary || current.includes("【動画要約】")) return current;
      return current ? `${current}\n\n${summary}` : summary;
    }

    function mergeOverrides(base, overrides) {
      const byId = new Map((Array.isArray(overrides) ? overrides : []).map(override => [Number(override.id), override]));
      const baseIds = new Set(base.map(question => Number(question.id)));
      const merged = base.map(question => {
        const override = byId.get(Number(question.id));
        const questionData = override?.questionData && typeof override.questionData === "object" ? override.questionData : {};
        const hasContentOverride = Object.keys(questionData).length || Array.isArray(override?.correctDiscards) || typeof override?.explanation === "string";
        return {
          ...question,
          ...questionData,
          correctDiscards: Array.isArray(override?.correctDiscards)
            ? override.correctDiscards
            : Array.isArray(question.correctDiscards) ? question.correctDiscards : [],
          explanation: mergeExplanationWithVideoSummary(question.explanation, typeof override?.explanation === "string" ? override.explanation : undefined),
          reviewed: override?.reviewed === true,
          overridden: hasContentOverride,
          overrideUpdatedAt: override?.overrideUpdatedAt || null,
          reviewUpdatedAt: override?.reviewUpdatedAt || null,
        };
      });
      for (const override of overrides || []) {
        if (!override?.questionData || baseIds.has(Number(override.id))) continue;
        merged.push({ ...override.questionData, reviewed: override.reviewed === true, overridden: true, overrideUpdatedAt: override.overrideUpdatedAt || null, reviewUpdatedAt: override.reviewUpdatedAt || null });
      }
      return merged.sort((left, right) => Number(left.id) - Number(right.id));
    }

    async function loadQuestions() {
      const [base, overrides] = await Promise.all([
        fetch("public/questions.json", { cache: "no-store" }).then(response => {
          if (!response.ok) throw new Error("問題データを読み込めませんでした。");
          return response.json();
        }),
        api("/api/overrides"),
      ]);
      baseQuestions = base;
      return mergeOverrides(base, overrides);
    }

    async function api(path, options = {}) {
      const headers = { "Content-Type": "application/json", ...(options.headers || {}) };
      if (options.admin) headers["X-Admin-Password"] = adminPassword;
      const response = await fetch(apiUrl(path), { ...options, headers, cache: "no-store" });
      const body = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(body.error || "処理に失敗しました。");
      return body;
    }

    document.getElementById("loginForm").addEventListener("submit", async event => {
      event.preventDefault();
      const message = document.getElementById("loginMessage");
      const supplied = document.getElementById("password").value;
      message.textContent = "確認しています…";
      try {
        await api("/api/admin/login", { method: "POST", body: JSON.stringify({ password: supplied }) });
        adminPassword = supplied;
        questions = await loadQuestions();
        document.getElementById("loginPanel").hidden = true;
        document.getElementById("adminPanel").hidden = false;
        renderList();
      } catch (error) {
        adminPassword = "";
        message.textContent = error.message;
      }
    });

    document.getElementById("search").addEventListener("input", renderList);
    document.getElementById("logout").addEventListener("click", () => {
      adminPassword = "";
      document.getElementById("password").value = "";
      location.href = "./";
    });
    document.getElementById("addQuestion").addEventListener("click", () => {
      const id = Math.max(0, ...questions.map(question => Number(question.id) || 0)) + 1;
      questions.push({ id, image: "", images: [], explanation: "", sourceUrl: "", sourceLabel: "YouTube動画を開く", createdAt: new Date().toISOString(), hand: [], draw: null, status: "unreviewed", meldCount: 0, round: "east1", seat: "west", turn: 6, honba: 0, points: 25000, dora: "1m", melds: [], correctDiscards: [], isNew: true });
      document.getElementById("search").value = String(id);
      renderList();
      const details = document.querySelector(".question-list details");
      if (details) details.open = true;
    });

    function matches(question, query) {
      if (!query) return true;
      const haystack = [
        question.id,
        question.explanation,
        ...(question.correctDiscards || []),
        ...(question.correctDiscards || []).map(tileName),
      ].join(" ").toLowerCase();
      return haystack.includes(query.toLowerCase());
    }

    function renderList() {
      const query = document.getElementById("search").value.trim();
      const filtered = questions.filter(question => matches(question, query));
      const list = document.getElementById("questionList");
      list.innerHTML = "";
      updateSummaryLine(filtered.length);
      if (!filtered.length) {
        list.innerHTML = '<div class="empty">該当する問題がありません。</div>';
        return;
      }

      for (const question of filtered) {
        const details = document.createElement("details");
        details.classList.toggle("reviewed", question.reviewed === true);
        const answerText = question.correctDiscards?.length
          ? question.correctDiscards.map(tileName).join("・")
          : "正解未設定";
        details.innerHTML = `
          <summary>
            <span class="qid">第${question.id}問</span>
            <span class="qcontext">${roundName(question.round)}　${WIND_NAMES[question.seat] || "―"}家　${question.turn ?? "―"}巡目</span>
            <label class="review-check"><input class="review-checkbox" type="checkbox" ${question.reviewed ? "checked" : ""}><span>確認完了</span></label>
            <span class="answer-state ${question.overridden ? "override" : question.correctDiscards?.length ? "" : "unset"}">${answerText}${question.overridden ? "　編集済み" : ""}</span>
          </summary>
          <div class="editor"></div>`;
        details.addEventListener("toggle", () => {
          if (details.open && !details.dataset.loaded) {
            details.dataset.loaded = "true";
            renderEditor(details, question);
          }
        });
        const reviewLabel = details.querySelector(".review-check");
        const reviewCheckbox = details.querySelector(".review-checkbox");
        reviewLabel.addEventListener("click", event => event.stopPropagation());
        reviewCheckbox.addEventListener("change", async () => {
          const previous = question.reviewed === true;
          reviewCheckbox.disabled = true;
          details.classList.toggle("reviewed", reviewCheckbox.checked);
          try {
            const saved = await api(`/api/admin/questions/${question.id}`, {
              method: "PATCH",
              admin: true,
              body: JSON.stringify({ reviewed: reviewCheckbox.checked }),
            });
            question.reviewed = saved.reviewed === true;
            question.reviewUpdatedAt = saved.reviewUpdatedAt || null;
            reviewCheckbox.checked = question.reviewed;
            details.classList.toggle("reviewed", question.reviewed);
            updateSummaryLine(filtered.length);
          } catch (error) {
            question.reviewed = previous;
            reviewCheckbox.checked = previous;
            details.classList.toggle("reviewed", previous);
            window.alert(error.message);
          } finally {
            reviewCheckbox.disabled = false;
          }
        });
        list.append(details);
      }
    }

    function updateSummaryLine(visibleCount = questions.length) {
      const configured = questions.filter(question => question.correctDiscards?.length).length;
      const reviewed = questions.filter(question => question.reviewed).length;
      document.getElementById("summaryLine").textContent = `${questions.length}問中 ${configured}問の正解を設定済み　／　確認完了 ${reviewed}問　／　表示 ${visibleCount}問`;
    }

    function renderEditor(details, question) {
      const editor = details.querySelector(".editor");
      const selected = new Set(question.correctDiscards || []);
      const draft = structuredClone(question);
      let target = null;
      const allTiles = [...Array.from({ length: 9 }, (_, index) => `${index + 1}m`), "0m", ...Array.from({ length: 9 }, (_, index) => `${index + 1}p`), "0p", ...Array.from({ length: 9 }, (_, index) => `${index + 1}s`), "0s", ...Array.from({ length: 7 }, (_, index) => `${index + 1}z`)];
      editor.innerHTML = `
        <p class="field-title">牌姿</p><p class="hint">牌を選ぶと金枠になります。下の牌を押すと差し替え、未選択なら手牌へ追加します。</p>
        <div class="tile-editor-row hand-row"></div><div class="tile-controls"><button type="button" class="delete-selected">選択牌を削除</button><button type="button" class="clear-hand">手牌を全消去</button></div>
        <p class="field-title">ドラ（押してから下の牌を選択）</p><div class="tile-editor-row dora-row"></div>
        <p class="field-title">副露</p><div class="meld-editor"></div><button type="button" class="meld-add">＋副露追加</button>
        <p class="field-title">牌パレット（37種）</p><div class="tile-palette"></div>
        <p class="field-title">正解打牌</p>
        <p class="hint">正解にする牌をタップしてください。複数選択できます。</p>
        <div class="answer-tiles"></div>
        <div class="meld-preview" hidden>
          <p class="field-title">副露面子</p>
          <div class="admin-melds" aria-label="副露面子"></div>
        </div>
        <label for="sourceUrl">元動画 URL</label>
        <p class="hint">ずんだもん何切るの元動画だけをここへ貼ってください。参考動画は解説文に貼ります。</p>
        <input id="sourceUrl" type="url" inputmode="url" placeholder="https://youtu.be/..." maxlength="2000">
        <label for="explanationText">解説文</label>
        <div class="format-toolbar" role="toolbar" aria-label="解説文の書式">
          <button class="format-button" type="button" data-format="bold" title="太字">B 太字</button>
          <button class="format-button red" type="button" data-format="red" title="赤文字">● 赤文字</button>
        </div>
        <p class="hint">文字を選んで押すと書式を付けます。太字は <code>**文字**</code>、赤文字は <code>[red]文字[/red]</code> として保存されます。</p>
        <textarea id="explanationText" maxlength="20000"></textarea>
        <div class="editor-actions">
          <button class="restore" type="button" ${question.overridden ? "" : "disabled"}>元に戻す</button>
          <button class="save" type="button">保存</button>
        </div>
        <p class="item-message" aria-live="polite"></p>`;
      const tiles = editor.querySelector(".answer-tiles");
      const textarea = editor.querySelector("#explanationText");
      const sourceUrlInput = editor.querySelector("#sourceUrl");
      const itemMessage = editor.querySelector(".item-message");
      textarea.value = draft.explanation || "";
      sourceUrlInput.value = draft.sourceUrl || "";
      const applyFormat = (format) => {
        const start = textarea.selectionStart;
        const end = textarea.selectionEnd;
        const selectedText = textarea.value.slice(start, end) || (format === "bold" ? "太字" : "赤文字");
        const [open, close] = format === "bold" ? ["**", "**"] : ["[red]", "[/red]"];
        textarea.setRangeText(`${open}${selectedText}${close}`, start, end, "select");
        textarea.focus();
      };
      editor.querySelectorAll("[data-format]").forEach(button => button.addEventListener("click", () => applyFormat(button.dataset.format)));

      const tileButton = (code, active, click) => { const button = document.createElement("button"); button.type = "button"; button.className = `edit-tile${active ? " target" : ""}`; const image = document.createElement("img"); image.src = tilePath(code); image.alt = tileName(code); image.width = 66; image.height = 90; button.append(image); button.addEventListener("click", click); return button; };
      const redrawStructure = () => {
        const handRow = editor.querySelector(".hand-row"); handRow.innerHTML = "";
        draft.hand.forEach((code, index) => handRow.append(tileButton(code, target?.kind === "hand" && target.index === index, () => { target = { kind: "hand", index }; redrawStructure(); })));
        const doraRow = editor.querySelector(".dora-row"); doraRow.innerHTML = ""; doraRow.append(tileButton(draft.dora, target?.kind === "dora", () => { target = { kind: "dora" }; redrawStructure(); }));
        const meldEditor = editor.querySelector(".meld-editor"); meldEditor.innerHTML = "";
        draft.melds.forEach((meld, meldIndex) => {
          const row = document.createElement("div"); row.className = "meld-edit";
          const typeSelect = document.createElement("select");
          typeSelect.setAttribute("aria-label", "副露の種類");
          typeSelect.innerHTML = '<option value="pon">ポン</option><option value="chi">チー</option><option value="kan">カン</option>';
          typeSelect.value = meld.type;
          typeSelect.addEventListener("change", () => { meld.type = typeSelect.value; const need = meld.type === "kan" ? 4 : 3; meld.tiles = Array.from({ length: need }, (_, index) => meld.tiles[index] || "1m"); meld.calledIndex = meld.type === "chi" ? 0 : Math.min(meld.calledIndex || 0, need - 1); redrawStructure(); });
          row.append(typeSelect);
          meld.tiles.forEach((code, tileIndex) => {
            const button = tileButton(code, target?.kind === "meld" && target.meldIndex === meldIndex && target.tileIndex === tileIndex, () => { target = { kind: "meld", meldIndex, tileIndex }; redrawStructure(); });
            if (meld.open && tileIndex === meld.calledIndex) button.classList.add("sideways");
            row.append(button);
          });
          const calledSelect = document.createElement("select");
          calledSelect.setAttribute("aria-label", "横向きの牌");
          calledSelect.innerHTML = meld.tiles.map((_, index) => `<option value="${index}">横 ${index + 1}</option>`).join("");
          calledSelect.value = String(meld.calledIndex || 0);
          calledSelect.disabled = meld.type === "chi";
          calledSelect.addEventListener("change", () => { meld.calledIndex = Number(calledSelect.value); redrawStructure(); });
          row.append(calledSelect);
          const remove = document.createElement("button"); remove.type = "button"; remove.className = "meld-remove"; remove.textContent = "削除"; remove.addEventListener("click", () => { draft.melds.splice(meldIndex, 1); target = null; redrawStructure(); }); row.append(remove); meldEditor.append(row);
        });
      };
      const redrawPalette = () => { const palette = editor.querySelector(".tile-palette"); palette.innerHTML = ""; allTiles.forEach(code => { const button = document.createElement("button"); button.type = "button"; button.className = "palette-tile"; const image = document.createElement("img"); image.src = tilePath(code); image.alt = tileName(code); image.width = 66; image.height = 90; button.append(image); button.addEventListener("click", () => { if (target?.kind === "hand") draft.hand[target.index] = code; else if (target?.kind === "dora") draft.dora = code; else if (target?.kind === "meld") draft.melds[target.meldIndex].tiles[target.tileIndex] = code; else if (draft.hand.length < 14) draft.hand.push(code); redrawStructure(); redrawTiles(); }); palette.append(button); }); };

      const redrawTiles = () => {
        tiles.innerHTML = "";
        draft.hand.forEach(code => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = `answer-tile${selected.has(code) ? " selected" : ""}`;
          button.setAttribute("aria-label", `${tileName(code)}を正解にする`);
          button.setAttribute("aria-pressed", selected.has(code) ? "true" : "false");
          const image = document.createElement("img");
          image.src = tilePath(code);
          image.alt = tileName(code);
          image.width = 66;
          image.height = 90;
          button.append(image);
          button.addEventListener("click", () => {
            if (selected.has(code)) selected.delete(code); else selected.add(code);
            redrawTiles();
          });
          tiles.append(button);
        });
      };
      editor.querySelector(".delete-selected").addEventListener("click", () => { if (target?.kind === "hand") { draft.hand.splice(target.index, 1); target = null; redrawStructure(); redrawTiles(); } });
      editor.querySelector(".clear-hand").addEventListener("click", () => { draft.hand = []; selected.clear(); target = null; redrawStructure(); redrawTiles(); });
      editor.querySelector(".meld-add").addEventListener("click", () => { draft.melds.push({ type: "pon", open: true, calledIndex: 0, tiles: ["1m", "1m", "1m"] }); redrawStructure(); });
      redrawStructure(); redrawPalette();
      redrawTiles();

      editor.querySelector(".save").addEventListener("click", async () => {
        itemMessage.className = "item-message";
        itemMessage.textContent = "保存しています…";
        try {
          draft.explanation = textarea.value;
          draft.sourceUrl = sourceUrlInput.value.trim();
          if (draft.sourceUrl && !/^https?:\/\//.test(draft.sourceUrl)) throw new Error("元動画 URL は http:// または https:// で入力してください。");
          draft.sourceLabel = draft.sourceUrl ? "元動画を開く" : "";
          draft.correctDiscards = [...selected];
          draft.meldCount = draft.melds.length;
          const requiredHandCount = 14 - draft.melds.reduce((total, meld) => total + meld.tiles.length, 0);
          if (draft.hand.length !== requiredHandCount) throw new Error(`手牌は${requiredHandCount}枚にしてください。`);
          if (!draft.dora) throw new Error("ドラを選択してください。");
          if (!draft.correctDiscards.length) throw new Error("正解打牌を1枚以上選択してください。");
          const saved = await api(question.isNew ? "/api/admin/questions" : `/api/admin/questions/${question.id}`, {
            method: question.isNew ? "POST" : "PUT",
            admin: true,
            body: JSON.stringify({ question: draft }),
          });
          const updated = { ...question, ...saved };
          delete updated.isNew;
          questions = question.isNew ? [...questions.filter(item => item !== question), updated].sort((a, b) => a.id - b.id) : questions.map(item => item.id === updated.id ? updated : item);
          Object.assign(question, updated);
          delete question.isNew;
          editor.querySelector(".restore").disabled = false;
          itemMessage.className = "item-message success";
          itemMessage.textContent = "保存しました。通常画面にも反映されています。";
          updateSummary(details, question);
        } catch (error) {
          itemMessage.textContent = error.message;
        }
      });

      const restoreButton = editor.querySelector(".restore");
      let restoreArmed = false;
      let restoreTimer = null;
      restoreButton.addEventListener("click", async () => {
        if (!restoreArmed) {
          restoreArmed = true;
          restoreButton.textContent = "もう一度押して復元";
          itemMessage.className = "item-message";
          itemMessage.textContent = `第${question.id}問の編集内容を復元する場合は、もう一度押してください。`;
          restoreTimer = setTimeout(() => {
            restoreArmed = false;
            restoreButton.textContent = "元に戻す";
            itemMessage.textContent = "";
          }, 15000);
          return;
        }
        restoreArmed = false;
        clearTimeout(restoreTimer);
        restoreButton.textContent = "元に戻す";
        itemMessage.className = "item-message";
        itemMessage.textContent = "元に戻しています…";
        try {
          await api(`/api/admin/questions/${question.id}`, { method: "DELETE", admin: true });
          const bundled = baseQuestions.find(item => item.id === question.id);
          if (!bundled) { questions = questions.filter(item => item.id !== question.id); renderList(); return; }
          const restored = {
            ...structuredClone(bundled),
            correctDiscards: Array.isArray(bundled.correctDiscards) ? bundled.correctDiscards : [],
            reviewed: question.reviewed === true,
            reviewUpdatedAt: question.reviewUpdatedAt || null,
            overridden: false,
            overrideUpdatedAt: null,
          };
          questions = questions.map(item => item.id === restored.id ? restored : item);
          Object.assign(question, restored);
          selected.clear();
          for (const code of restored.correctDiscards || []) selected.add(code);
          textarea.value = restored.explanation || "";
          redrawTiles();
          restoreButton.disabled = true;
          itemMessage.className = "item-message success";
          itemMessage.textContent = "原本の内容へ戻しました。";
          updateSummary(details, question);
        } catch (error) {
          itemMessage.textContent = error.message;
        }
      });
    }

    function updateSummary(details, question) {
      const state = details.querySelector(".answer-state");
      const answerText = question.correctDiscards?.length ? question.correctDiscards.map(tileName).join("・") : "正解未設定";
      state.className = `answer-state ${question.overridden ? "override" : question.correctDiscards?.length ? "" : "unset"}`;
      state.textContent = `${answerText}${question.overridden ? "　編集済み" : ""}`;
      const query = document.getElementById("search").value.trim();
      updateSummaryLine(questions.filter(item => matches(item, query)).length);
    }
  </script>
</body>
</html>
